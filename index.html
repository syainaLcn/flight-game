<!DOCTYPE html>
<html>
<head>
    <title>NEON FLIGHT</title>
    <style>
        body { margin: 0; background: #011627; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #2EC4B6; font-size: 2rem; font-weight: bold; pointer-events: none; }
        #overlay { position: fixed; inset: 0; background: rgba(1, 22, 39, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 10; }
        button { background: #E71D36; border: none; color: white; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>

    <div id="overlay">
        <h1 id="title">NEON FLIGHT</h1>
        <p>HOLD MOUSE to Fly Up | RELEASE to Fall</p>
        <button onclick="start()">START GAME</button>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');

    let player = { x: 100, y: 300, vy: 0, w: 30, h: 20 };
    let pipes = [];
    let score = 0;
    let active = false;
    let pressing = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    // Controls
    window.onmousedown = () => pressing = true;
    window.onmouseup = () => pressing = false;

    function start() {
        player.y = canvas.height / 2;
        player.vy = 0;
        pipes = [];
        score = 0;
        scoreEl.innerText = "0";
        active = true;
        overlay.style.display = 'none';
        loop();
    }

    function spawnPipe() {
        const gap = 200;
        const minHeight = 50;
        const h = Math.random() * (canvas.height - gap - (minHeight * 2)) + minHeight;
        pipes.push({ x: canvas.width, topH: h, gap: gap });
    }

    function loop() {
        if(!active) return;

        // Background
        ctx.fillStyle = "#011627";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Player Physics
        if(pressing) player.vy -= 0.6; // Fly up
        else player.vy += 0.6; // Gravity
        
        player.y += player.vy;
        player.vy *= 0.95; // Friction para hindi sobrang bilis

        // Draw Player (Neon Triangle)
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#2EC4B6";
        ctx.fillStyle = "#2EC4B6";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + player.w, player.y + player.h/2);
        ctx.lineTo(player.x, player.y + player.h);
        ctx.closePath();
        ctx.fill();

        // Pipes Logic
        if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 300) {
            spawnPipe();
        }

        for(let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= 5; // Speed ng usad

            // Draw Pipes
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#FF9F1C"; // Top Pipe
            ctx.fillRect(p.x, 0, 50, p.topH);
            ctx.fillStyle = "#E71D36"; // Bottom Pipe
            ctx.fillRect(p.x, p.topH + p.gap, 50, canvas.height);

            // Collision Check
            if(player.x + player.w > p.x && player.x < p.x + 50) {
                if(player.y < p.topH || player.y + player.h > p.topH + p.gap) {
                    gameOver();
                }
            }

            // Score point
            if(!p.passed && p.x < player.x) {
                p.passed = true;
                score++;
                scoreEl.innerText = score;
            }

            if(p.x < -100) pipes.splice(i, 1);
        }

        // Screen boundaries
        if(player.y < 0 || player.y > canvas.height) gameOver();

        requestAnimationFrame(loop);
    }

    function gameOver() {
        active = false;
        overlay.style.display = 'flex';
        document.getElementById('title').innerText = "CRASHED!";
        document.getElementById('title').style.color = "#E71D36";
    }
</script>
</body>
</html>
